name: Shopping Cart Frontend CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: node -v

      - run: npm -v

      - name: Show current directory
        run: pwd

      - name: List files
        run: ls -la

      - name: Check lock file
        run: |
          ls -l package*.json
          head -20 package.json
          head -20 package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
